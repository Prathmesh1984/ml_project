<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ff7e5f, #feb47b);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px 40px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: #ff7e5f;
        box-shadow: 0 0 5px rgba(255,126,95,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(to right, #ff7e5f, #feb47b);
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .result {
        margin-top: 20px;
        padding: 10px;
        background: #e6ffe6;
        border-left: 5px solid green;
        border-radius: 5px;
        font-size: 18px;
        color: #333;
    }
</style>
```

</head>

<body>

<div class="container">

```
<h1>🔥 FWI Prediction</h1>

<form action="/predictdata" method="POST">
    <input type="text" name="Temperature" placeholder="Temperature" required>
    <input type="text" name="RH" placeholder="RH" required>
    <input type="text" name="Ws" placeholder="Ws" required>
    <input type="text" name="Rain" placeholder="Rain" required>
    <input type="text" name="FFMC" placeholder="FFMC" required>
    <input type="text" name="DMC" placeholder="DMC" required>
    <input type="text" name="ISI" placeholder="ISI" required>
    <input type="text" name="Classes" placeholder="Classes" required>
    <input type="text" name="Region" placeholder="Region" required>

    <button type="submit">Predict</button>
</form>

{% if results %}
    <div class="result">
        THE FWI prediction is {{ results }}
    </div>
{% endif %}
